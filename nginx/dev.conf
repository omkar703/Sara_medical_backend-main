upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name saramedico.com www.saramedico.com;
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl;
    server_name saramedico.com www.saramedico.com;

    ssl_certificate /etc/letsencrypt/live/saramedico.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saramedico.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Max upload size
    client_max_body_size 100M;

    # ----- Backend API + WebSockets -----
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ----- Backend Utility Routes -----
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ----- MinIO Buckets (Fixes Mixed Content Error) -----
    # Match the rewritten /s3/ prefix URLs that the backend generates for presigned URLs
    location /s3/ {
        # Strip the /s3/ part so MinIO sees the exact path that was signed (e.g. /saramedico-documents/...)
        rewrite ^/s3/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        
        # IMPORTANT: MinIO signatures are strictly tied to the exact Host header used to sign them!
        # Because the backend uses the internal `minio:9000` client to sign the URLs, Nginx MUST pass
        # that exact Host header. If it passes Host $host (saramedico.com), MinIO will reject the signature.
        proxy_set_header Host minio:9000;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- Frontend (catch-all) -----
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Production-ready Nginx Config with SSL and MinIO Proxy
server {
    listen 80;
    server_name saramedico.com www.saramedico.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name saramedico.com www.saramedico.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/saramedico.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saramedico.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Secure Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Max body size
    client_max_body_size 100M;

    # Frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Backend API + WebSockets
    location /api/v1 {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # MinIO Proxy (Fixes Mixed Content Errors)
    location /s3/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_buffering off;
    }

    # Health Check
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # Direct bucket access (Optional Shortcut)
    location /saramedico-avatars/ {
        proxy_pass http://minio:9000/saramedico-avatars/;
        proxy_set_header Host $host;
    }
}

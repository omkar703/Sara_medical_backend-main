upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

# 🔴 HTTP → HTTPS redirect
server {
    listen 80;
    server_name saramedico.com www.saramedico.com;

    return 301 https://$host$request_uri;
}

# 🔒 HTTPS server
server {
    listen 443 ssl;
    server_name saramedico.com www.saramedico.com;

    ssl_certificate /etc/letsencrypt/live/saramedico.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saramedico.com/privkey.pem;

    # Increase upload size
    client_max_body_size 100M;

    # ----- API routes → Backend -----
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ----- Backend routes -----
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ----- MinIO Buckets -----
    location ~* ^/(saramedico-uploads|saramedico-documents|saramedico-audio|saramedico-avatars)/ {
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- Frontend -----
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}